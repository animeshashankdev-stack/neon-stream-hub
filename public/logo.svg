<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="#0A0618"/>
  <!-- Kana-inspired stroke mark (abstract せ/シ vibes) -->
  <g filter="url(#glow)" stroke="url(#sg)" stroke-width="4.5" stroke-linecap="round" fill="none">
    <path d="M14 22 H50"/>
    <path d="M24 14 C 24 30, 22 42, 16 50"/>
    <path d="M40 18 C 42 30, 44 42, 50 50"/>
    <circle cx="32" cy="44" r="3.2" fill="url(#sg)" stroke="none"/>
  </g>
</svg>
